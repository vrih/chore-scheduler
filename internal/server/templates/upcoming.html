{{define "upcoming.html"}}
<div class="page">
  <div class="page-head">
    <h1>Upcoming</h1>
    <div class="range-toggle">
      <button class="range-btn {{if eq .Days 7}}active{{end}}"
              hx-get="/upcoming?days=7" hx-target="#main" hx-swap="innerHTML">7d</button>
      <button class="range-btn {{if eq .Days 14}}active{{end}}"
              hx-get="/upcoming?days=14" hx-target="#main" hx-swap="innerHTML">14d</button>
      <button class="range-btn {{if eq .Days 30}}active{{end}}"
              hx-get="/upcoming?days=30" hx-target="#main" hx-swap="innerHTML">30d</button>
    </div>
  </div>

  {{if .Grid}}
  <div class="upcoming-grid">
    {{range .Grid}}
    <div class="upcoming-day">
      <div class="upcoming-day-head">
        <span class="upcoming-day-label">{{.DayLabel}}</span>
        <span class="upcoming-day-effort">effort {{.TotalEffort}}</span>
      </div>
      <div class="upcoming-tasks">
        {{range .Tasks}}
        <div class="upcoming-task">
          <span class="upcoming-task-name">{{.Name}}</span>
          <span class="upcoming-task-right">
            {{effortDots .Effort}}
            <span class="upcoming-task-room">{{.Room}}</span>
          </span>
        </div>
        {{end}}
      </div>
    </div>
    {{end}}
  </div>
  {{else}}
  <div class="empty-state">No tasks scheduled in this window.</div>
  {{end}}
</div>
{{end}}

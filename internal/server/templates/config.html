{{define "config.html"}}
<div class="page">
  <h1 class="page-title">Settings</h1>

  {{if .Flash}}<div class="flash flash-success">{{.Flash}}</div>{{end}}
  {{if .Error}}<div class="flash flash-error">{{.Error}}</div>{{end}}

  <div class="settings-card">
    <form hx-post="/config" hx-target="#main" hx-swap="innerHTML">

      <div class="field-group">
        <label class="field-label">Max daily effort</label>
        <div class="field-hint">Total effort schedulable per day &middot; Quick 1 &middot; Medium 2 &middot; Long 3</div>
        <input name="max_daily_effort" type="number" class="field-input field-input-sm"
               value="{{.MaxDailyEffort}}" min="1" max="99">
      </div>

      <div class="field-group">
        <label class="field-label">Email digest recipient</label>
        <input name="email_to" type="email" class="field-input"
               value="{{.EmailTo}}" placeholder="you@example.com">
      </div>

      <div class="field-group">
        <label class="field-label">Email digest sender</label>
        <input name="email_from" type="email" class="field-input"
               value="{{.EmailFrom}}">
      </div>

      <button type="submit" class="btn-primary-full" style="width:auto;padding:13px 28px">Save settings</button>
    </form>
  </div>

  <div class="danger-card">
    <div class="danger-card-title">Reschedule everything</div>
    <div class="danger-card-body">Clears all scheduled entries and rebuilds from scratch.</div>
    <button class="btn-danger-outline"
            hx-post="/reschedule"
            hx-target="#main" hx-swap="innerHTML"
            hx-confirm="Reschedule everything from scratch?">
      Reschedule all tasks
    </button>
  </div>
</div>
{{end}}

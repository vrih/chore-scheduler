{{define "rooms.html"}}
<div class="page">
  <h1 class="page-title">Rooms</h1>

  {{if .FloorGroups}}
  {{range .FloorGroups}}
  <div class="floor-label">{{.Label}}</div>
  <div class="rooms-grid">
    {{range .Rooms}}
    <button class="room-card"
            hx-get="/rooms/{{.Name}}" hx-target="#main" hx-swap="innerHTML">
      <div class="room-mono">{{.Monogram}}</div>
      <div class="room-card-name">{{.Name}}</div>
      <div class="room-card-sub">{{.Total}} {{if eq .Total 1}}chore{{else}}chores{{end}} &middot; {{.DueCount}} due</div>
    </button>
    {{end}}
  </div>
  {{end}}
  {{else}}
  <div class="empty-state">No rooms yet. Add tasks with rooms assigned.</div>
  {{end}}
</div>
{{end}}
